<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ryen's Hideout</title>
  <link rel="icon" type="image/png" href="./assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Stack+Sans+Headline:wght@200..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">Ryen's Hideout</a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/#about">About</a></li>
      <li><a href="/#contact">Contact</a></li>
      <li><button onclick="toggleTheme()" class="nav-icon-btn">◑</button></li>
    </ul>
  </nav>
  <section class="gallery">
    <div id="loading" style="text-align:center; padding: 2rem; color: var(--mid);">Fetching archive...</div>
    <div id="auto-grid"></div>
  </section>
  <footer class="footer">
  <div class="footer-content">
    <div class="footer-left">
      <a href="/" class="footer-logo">Ryen's Hideout</a>
      <p>© 2026 — Photography Archive</p>
    </div>
  </div>
</footer>

   <!-- LIGHTBOX -->
  <div class="lb" id="lb">
    <button class="lb-close" id="lbClose">✕ Close</button>
    <div class="lb-img-wrap">
      <img src="" alt="" id="lbImg" />
      <p class="lb-caption" id="lbCap"></p>
    </div>
  </div>
</body>
<script>
    const GITHUB_USER = 'megshideout'; 
    const REPO_NAME = 'megshideout.github.io';
    const BASE_PATH = 'shots'; 

    const urlParams = new URLSearchParams(window.location.search);
    const currentAlbum = urlParams.get('album');

    const io = new IntersectionObserver(entries => {
      entries.forEach((e) => {
        if (!e.isIntersecting) return;
        const d = +e.target.dataset.delay || 0;
        setTimeout(() => e.target.classList.add('in'), d);
        io.unobserve(e.target);
      });
    }, { threshold: 0.1 });

    const lb = document.getElementById('lb');
    const lbImg = document.getElementById('lbImg');
    const lbCap = document.getElementById('lbCap');

    function openLightbox(item) {
        const img = item.querySelector('img');
        lbImg.src = img.src;
        lbImg.alt = img.alt;
        lbCap.textContent = `${item.dataset.title} — ${item.dataset.loc}`;
        lb.classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    const closeLb = () => { lb.classList.remove('open'); document.body.style.overflow = ''; };
    document.getElementById('lbClose').addEventListener('click', closeLb);
    lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb(); });

    const toggleTheme = () => {
      const html = document.documentElement;
      const target = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', target);
      localStorage.setItem('theme', target);
    };
    document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');

    function initBunkerLogic() {
        document.querySelectorAll('.g-item').forEach((el, i) => {
            el.dataset.delay = i * 50; 
            io.observe(el); 
            el.addEventListener('click', () => openLightbox(el));
        });
    }

    async function loadGallery() {
        const container = document.getElementById('auto-grid');
        const loader = document.getElementById('loading');

        try {
            if (currentAlbum) {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${BASE_PATH}/${currentAlbum}`);
                const files = await response.json();
                const images = files.filter(file => file.name.match(/\.(jpe?g|png|webp|gif)$/i));

                loader.innerHTML = `<a href="/gallery" style="color:var(--mid); text-decoration:none; font-size:0.8rem;">← BACK TO ARCHIVE</a><h1 class="album-header" style="text-transform:capitalize; margin-top:1rem;">${currentAlbum.replace(/-/g, ' ')}</h1>`;

                container.className = "gallery-grid"; 
                container.innerHTML = images.map((img) => `
                    <div class="g-item" data-title="${img.name.split('.')[0]}" data-loc="${currentAlbum}">
                        <img src="${img.download_url}" alt="${img.name}" loading="lazy">
                    </div>
                `).join('');

            } else {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${BASE_PATH}`);
                const contents = await response.json();
                
                loader.style.display = 'none';
                container.innerHTML = ''; 

                for (const item of contents) {
                    if (item.type === 'dir') {
                        const albumRes = await fetch(item.url);
                        const photos = await albumRes.json();
                        const previews = photos.filter(f => f.name.match(/\.(jpe?g|png|webp)$/i)).slice(0, 4);

                        const section = document.createElement('section');
                        section.className = 'album-section';
                        section.style.marginBottom = "5rem";
                        
                        section.innerHTML = `
                            <div style="display:flex; justify-content:space-between; align-items:baseline; border-bottom:1px solid var(--border); margin-bottom:1.5rem;">
                                <h2 class="album-header" style="text-transform:capitalize; margin:0; border:none;">${item.name.replace(/-/g, ' ')}</h2>
                                <a href="?album=${item.name}" style="color:var(--mid); text-decoration:none; font-size:0.7rem; letter-spacing:1px;">SEE ALL →</a>
                            </div>
                            <div class="album-row" style="display:grid; grid-template-columns:repeat(4, 1fr); gap:1rem;">
                                ${previews.map(img => `
                                    <div class="g-item" data-title="${img.name.split('.')[0]}" data-loc="${item.name}">
                                        <img src="${img.download_url}" alt="${img.name}" loading="lazy">
                                    </div>
                                `).join('')}
                            </div>
                        `;
                        container.appendChild(section);
                    }
                }
            }
            initBunkerLogic(); 
        } catch (err) {
            loader.textContent = "Failed to load archive lol";
            console.error(err);
        }
    }

    loadGallery();
</script>
